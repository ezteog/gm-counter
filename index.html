<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GM Counter · Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --base-blue: #0000FF;     /* Base Blue (preenchimentos) */
      --blue-bright: #4d6bff;   /* azul mais claro p/ texto no preto */
      --black: #0A0B0D;         /* preto Base (alto contraste) */
      --white: #FFFFFF;
      --muted: #8b90a6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--white);
      background-color: var(--black);
      background-image: radial-gradient(circle at 50% 30%, rgba(0,0,255,0.30), transparent 55%);
      padding: 1.5rem;
    }

    /* Quadrado azul arredondado (inspirado no estilo Base) */
    .logo {
      width: 72px;
      height: 72px;
      background: var(--base-blue);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.4rem;
      box-shadow: 0 8px 30px rgba(0,0,255,0.5);
    }
    .logo .inner {
      width: 26px;
      height: 26px;
      background: var(--white);
      border-radius: 7px;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.3rem;
    }

    .tagline {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin: 0 0 2rem;
    }

    p { font-size: 1.15rem; color: #c3c7d6; margin: 0; }

    #count { font-weight: 700; color: var(--blue-bright); }

    .streak {
      font-size: 1.05rem;
      color: #ffd479;
      margin-top: 0.6rem;
    }
    #streak { font-weight: 700; }

    .last-gm {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .buttons {
      margin-top: 1.9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    button {
      padding: 1rem 2.8rem;
      font-size: 1.25rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      color: var(--white);
      background-color: var(--base-blue);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,255,0.45);
      transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }
    button:hover {
      background-color: #1a1aff;
      box-shadow: 0 10px 30px rgba(0,0,255,0.6);
    }
    button:active { transform: scale(0.96); }

    .reset {
      background-color: transparent;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.6rem 1.6rem;
      border: 1px solid #23252f;
      box-shadow: none;
    }
    .reset:hover {
      background-color: rgba(255,255,255,0.04);
      color: var(--white);
      box-shadow: none;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="logo"><div class="inner"></div></div>

  <h1>GM Counter</h1>
  <p class="tagline">onchain good mornings · built on Base 🟦</p>

  <p>Você disse GM <span id="count">0</span> vezes</p>
  <p class="streak">🔥 Sequência: <span id="streak">0</span> dia(s)</p>
  <p class="last-gm">Último GM: <span id="lastGm">—</span></p>

  <div class="buttons">
    <button id="gmButton">GM ☀️</button>
    <button id="resetButton" class="reset">Resetar</button>
  </div>

  <footer>Tema inspirado no Base · não afiliado à Coinbase</footer>

  <script>
    // Carrega os valores salvos (ou usa o padrão se não houver nada)
    let count = Number(localStorage.getItem("gmCount")) || 0;
    let lastGm = localStorage.getItem("lastGm") || null;
    let streak = Number(localStorage.getItem("streak")) || 0;
    let lastGmDay = localStorage.getItem("lastGmDay") || null;

    const countEl = document.getElementById("count");
    const lastGmEl = document.getElementById("lastGm");
    const streakEl = document.getElementById("streak");
    const button = document.getElementById("gmButton");
    const resetButton = document.getElementById("resetButton");

    countEl.textContent = count;
    streakEl.textContent = streak;
    if (lastGm) { lastGmEl.textContent = lastGm; }

    function diaDeHoje() {
      const hoje = new Date();
      const ano = hoje.getFullYear();
      const mes = String(hoje.getMonth() + 1).padStart(2, "0");
      const dia = String(hoje.getDate()).padStart(2, "0");
      return ano + "-" + mes + "-" + dia;
    }

    function diferencaEmDias(de, ate) {
      const d1 = new Date(de + "T00:00:00");
      const d2 = new Date(ate + "T00:00:00");
      const umDia = 1000 * 60 * 60 * 24;
      return Math.round((d2 - d1) / umDia);
    }

    button.addEventListener("click", function () {
      count = count + 1;
      countEl.textContent = count;
      localStorage.setItem("gmCount", count);

      const agora = new Date();
      lastGm = agora.toLocaleString("pt-BR");
      lastGmEl.textContent = lastGm;
      localStorage.setItem("lastGm", lastGm);

      const hoje = diaDeHoje();
      if (lastGmDay === null) {
        streak = 1;
      } else if (lastGmDay === hoje) {
        // mesmo dia: streak não muda
      } else {
        const dias = diferencaEmDias(lastGmDay, hoje);
        streak = (dias === 1) ? streak + 1 : 1;
      }
      lastGmDay = hoje;
      streakEl.textContent = streak;
      localStorage.setItem("streak", streak);
      localStorage.setItem("lastGmDay", lastGmDay);
    });

    resetButton.addEventListener("click", function () {
      const confirmar = confirm("Tem certeza que deseja zerar o contador?");
      if (confirmar) {
        count = 0;
        countEl.textContent = count;
        localStorage.removeItem("gmCount");

        lastGm = null;
        lastGmEl.textContent = "—";
        localStorage.removeItem("lastGm");

        streak = 0;
        lastGmDay = null;
        streakEl.textContent = streak;
        localStorage.removeItem("streak");
        localStorage.removeItem("lastGmDay");
      }
    });
  </script>
</body>
</html>
