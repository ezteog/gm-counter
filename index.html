<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GM Counter</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      color: #cccccc;
    }

    #count {
      font-weight: bold;
      color: #ffffff;
    }

    button {
      margin-top: 1.5rem;
      padding: 1rem 2.5rem;
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffffff;
      background-color: #333333;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.2s ease;
    }

    button:hover {
      background-color: #444444;
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <h1>GM Counter ☀️</h1>
  <p>Você disse GM <span id="count">0</span> vezes</p>
  <button id="gmButton">GM ☀️</button>

  <script>
    // Carrega o número salvo (ou começa em 0 se não houver nada salvo)
    let count = Number(localStorage.getItem("gmCount")) || 0;

    const countEl = document.getElementById("count");
    const button = document.getElementById("gmButton");

    // Mostra o número salvo assim que a página abre
    countEl.textContent = count;

    button.addEventListener("click", function () {
      count = count + 1;
      countEl.textContent = count;
      // Salva o novo número na gavetinha do navegador
      localStorage.setItem("gmCount", count);
    });
  </script>
</body>
</html>
