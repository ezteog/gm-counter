<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GM Counter · Base</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="logo"><div class="inner"></div></div>

  <h1>GM Counter</h1>
  <p class="tagline">onchain good mornings · built on Base 🟦</p>

  <p>Você disse GM <span id="count">0</span> vezes</p>
  <p class="streak">🔥 Sequência: <span id="streak">0</span> dia(s)</p>
  <p class="last-gm">Último GM: <span id="lastGm">—</span></p>

  <div class="buttons">
    <button id="gmButton">GM ☀️</button>
    <button id="resetButton" class="reset">Resetar</button>
  </div>

  <footer>Tema inspirado no Base · não afiliado à Coinbase</footer>

  <script src="script.js"></script>
</body>
</html>
