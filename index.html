<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GM Counter</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      background-color: #05060f;
      background-image: radial-gradient(circle at 50% 35%, rgba(0,0,255,0.35), transparent 60%);
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.15rem;
      color: #aab2d5;
      margin-top: 0;
    }

    #count {
      font-weight: bold;
      color: #4d4dff;
    }

    button {
      margin-top: 1.8rem;
      padding: 1rem 2.8rem;
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffffff;
      background-color: #0000FF;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,255,0.45);
      transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    button:hover {
      background-color: #1a1aff;
      box-shadow: 0 10px 30px rgba(0,0,255,0.6);
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <h1>GM Counter ☀️</h1>
  <p>Você disse GM <span id="count">0</span> vezes</p>
  <button id="gmButton">GM ☀️</button>

  <script>
    // Carrega o número salvo (ou começa em 0 se não houver nada salvo)
    let count = Number(localStorage.getItem("gmCount")) || 0;

    const countEl = document.getElementById("count");
    const button = document.getElementById("gmButton");

    // Mostra o número salvo assim que a página abre
    countEl.textContent = count;

    button.addEventListener("click", function () {
      count = count + 1;
      countEl.textContent = count;
      // Salva o novo número na gavetinha do navegador
      localStorage.setItem("gmCount", count);
    });
  </script>
</body>
</html>
