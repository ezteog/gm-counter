<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GM Counter</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
      background-color: #05060f;
      background-image: radial-gradient(circle at 50% 35%, rgba(0,0,255,0.35), transparent 60%);
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.15rem;
      color: #aab2d5;
      margin-top: 0;
    }

    #count {
      font-weight: bold;
      color: #4d4dff;
    }

    .last-gm {
      font-size: 0.9rem;
      color: #6b73a0;
      margin-top: 0.4rem;
    }

    .buttons {
      margin-top: 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    button {
      padding: 1rem 2.8rem;
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffffff;
      background-color: #0000FF;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,255,0.45);
      transition: transform 0.1s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    button:hover {
      background-color: #1a1aff;
      box-shadow: 0 10px 30px rgba(0,0,255,0.6);
    }

    button:active {
      transform: scale(0.96);
    }

    .reset {
      background-color: transparent;
      color: #aab2d5;
      font-size: 0.95rem;
      font-weight: normal;
      padding: 0.6rem 1.6rem;
      border: 1px solid #2a2d4a;
      box-shadow: none;
    }

    .reset:hover {
      background-color: rgba(255,255,255,0.05);
      color: #ffffff;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <h1>GM Counter ☀️</h1>
  <p>Você disse GM <span id="count">0</span> vezes</p>
  <p class="last-gm">Último GM: <span id="lastGm">—</span></p>

  <div class="buttons">
    <button id="gmButton">GM ☀️</button>
    <button id="resetButton" class="reset">Resetar</button>
  </div>

  <script>
    // Carrega os valores salvos (ou usa o padrão se não houver nada)
    let count = Number(localStorage.getItem("gmCount")) || 0;
    let lastGm = localStorage.getItem("lastGm") || null;

    const countEl = document.getElementById("count");
    const lastGmEl = document.getElementById("lastGm");
    const button = document.getElementById("gmButton");
    const resetButton = document.getElementById("resetButton");

    // Mostra os valores salvos assim que a página abre
    countEl.textContent = count;
    if (lastGm) {
      lastGmEl.textContent = lastGm;
    }

    button.addEventListener("click", function () {
      count = count + 1;
      countEl.textContent = count;
      localStorage.setItem("gmCount", count);

      // Guarda a data e hora atuais, formatadas em português
      const agora = new Date();
      lastGm = agora.toLocaleString("pt-BR");
      lastGmEl.textContent = lastGm;
      localStorage.setItem("lastGm", lastGm);
    });

    resetButton.addEventListener("click", function () {
      const confirmar = confirm("Tem certeza que deseja zerar o contador?");
      if (confirmar) {
        count = 0;
        countEl.textContent = count;
        localStorage.removeItem("gmCount");

        // Zera também a data do último GM
        lastGm = null;
        lastGmEl.textContent = "—";
        localStorage.removeItem("lastGm");
      }
    });
  </script>
</body>
</html>
